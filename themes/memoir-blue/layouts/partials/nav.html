<nav>
    {{ range .Site.Menus.mainmenu }}
        <h4><a href="{{ .URL }}">{{ .Name }}</a></h4>
    {{ end }}
</nav>

<style>
    nav {
        display: flex;
        padding: 0.3rem 0;
        flex-direction: row;
        background-color: #e1e7f5;
        justify-content: space-around;
    }
    nav h4 {
        cursor: pointer;
    }
    nav h4 a:visited{
        color: #000;
    }
    nav h4 a{
        color: #000;
        text-decoration: none;
    }
    nav h4:hover {
        text-decoration: underline;
    }
</style>
